# Fly.io configuration for docs-agent backend.
# Region: gru (São Paulo) — closest to dev (Doug, Brazil) + assessment timezone.
# To deploy:
#   1. flyctl auth signup   (one-time, if no account)
#   2. flyctl launch --no-deploy --copy-config --name docs-agent
#      (run from this directory; --no-deploy lets us set secrets first)
#   3. flyctl secrets set ANTHROPIC_API_KEY=... OPENAI_API_KEY=... \
#                         SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=...
#   4. flyctl deploy
#
# After first deploy: `flyctl status` shows the public URL, e.g.
#   https://docs-agent.fly.dev

app = "docs-agent"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "15s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # Models / retrieval defaults — overridable via fly secrets if needed.
  ANTHROPIC_AGENT_MODEL = "claude-sonnet-4-6"
  ANTHROPIC_JUDGE_MODEL = "claude-haiku-4-5"
  EMBED_MODEL = "text-embedding-3-small"
  RAG_MATCH_COUNT = "8"
  KB_HIGH_CONFIDENCE_SIM = "0.78"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"      # save money: stop when idle
  auto_start_machines = true       # wake on first request
  min_machines_running = 0
  # SSE responses can be long — be generous with the request timeout.
  # The agent loop typically completes in 5-60s.
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Healthcheck — Fly hits this to know when to route traffic.
[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"
