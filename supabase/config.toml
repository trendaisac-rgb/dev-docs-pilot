# Supabase project config — minimal, only what we need for the chat function.
# Generated by hand to match the Interview project (qonbpdqlkfsiosdkzjtf).
# Run `supabase link --project-ref qonbpdqlkfsiosdkzjtf` to attach this repo
# to the existing project, then `supabase functions deploy chat`.

project_id = "qonbpdqlkfsiosdkzjtf"

[api]
enabled = true

[edge_runtime]
enabled = true
inspector_port = 8083

[functions.chat]
verify_jwt = false  # the assessment frontend doesn't ship JWT auth yet
import_map = "./functions/chat/deno.json"
